<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Le competenze digitali dei giovani italiani</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  html {
    background: #F5E5D5;
    min-height: 100vh;
  }
  body {
    margin: 0;
    padding: 0;
    background: #F5E5D5;
    font-family: 'Futura', 'Century Gothic', 'Trebuchet MS', sans-serif;
  }
  #wrapper {
    width: 660px;
    height: 660px;
    max-width: 100%;
    margin: 0 auto;
    background: #F5E5D5;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    padding: 8px 10px;
    position: relative;
  }
  @media (max-width: 500px) {
    /* In mobile togliamo l'altezza fissa: il grafico si adatta in verticale */
    #wrapper {
      width: 100%;
      height: auto;
      padding: 10px 12px;
    }
  }
  #header {
    text-align: right;
    flex-shrink: 0;
  }
  #title {
    font-size: 13px;
    font-weight: bold;
    color: #000;
    margin: 0;
    line-height: 1.1;
  }
  #subtitle {
    font-size: 9px;
    color: #000;
    margin: 2px 0 0 0;
    line-height: 1.2;
  }
  #chart {
    flex: 1;
    position: relative;
    overflow: visible;
    min-height: 0;
  }
  #chart svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  #footer {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-top: 4px;
  }
  #legend {
    font-size: 8px;
    color: #000;
    line-height: 1.4;
  }
  #legend .item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #legend .swatch {
    width: 9px;
    height: 9px;
    display: inline-block;
    flex-shrink: 0;
  }
  #logo {
    width: 40px;
    height: 40px;
    border-radius: 4px;
  }
  @media (max-width: 500px) {
    #title { font-size: 11px; }
    #subtitle { font-size: 8px; }
    #legend { font-size: 7px; }
    #legend .swatch { width: 7px; height: 7px; }
    #logo { width: 32px; height: 32px; }
  }
  .region-label {
    font-size: 11px;
    fill: #000;
    text-anchor: middle;
    font-family: 'Futura', 'Century Gothic', sans-serif;
  }
  .sector {
    stroke: #F5E5D5;
    stroke-width: 0.8;
    cursor: default;
    transition: opacity 0.15s;
  }
  .sector:hover {
    opacity: 0.75;
  }
  .sector.na {
    fill: #F5E5D5;
    stroke: #826B6D;
    stroke-width: 0.6;
    stroke-dasharray: 2,1.5;
  }
  .guide-circle {
    fill: none;
    stroke: #826B6D;
    stroke-width: 0.3;
    opacity: 0.5;
  }
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: #1A4358;
    color: #F5E5D5;
    padding: 7px 9px;
    font-size: 10px;
    font-family: 'Futura', 'Century Gothic', sans-serif;
    line-height: 1.45;
    border-radius: 3px;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 100;
    max-width: 200px;
  }
  .tooltip b {
    font-weight: bold;
  }
</style>
</head>

// Configurazione colori: ordine fisso per i 4 settori
// settore 0 (alto-dx, 0-90°): Totale regione -> #1A4358
// settore 1 (basso-dx, 90-180°): Zone densamente popolate -> #DA4167
// settore 2 (basso-sx, 180-270°): Zone a densità intermedia -> #68995D
// settore 3 (alto-sx, 270-360°): Zone scarsamente popolate -> #FDCA41
const SECTORS = [
  {key: "totale",     label: "Totale regione",          color: "#1A4358"},
  {key: "densa",      label: "Zone densamente popolate", color: "#DA4167"},
  {key: "intermedia", label: "Zone a densità intermedia",color: "#68995D"},
  {key: "scarsa",     label: "Zone scarsamente popolate",color: "#FDCA41"}
];

// Griglia 3 colonne × 7 righe
const COLS = 3, ROWS = 7;

// Dimensioni viewBox: differenziate desktop vs mobile
// Desktop 660x660: header+footer ~70px -> chart 660x560 -> celle 220x80 (rapporto 2.75:1)
// Mobile: voglio celle tendenzialmente quadrate per sfruttare larghezza intera
// Con CELL_W = 375/3 = 125 e celle quadrate, VIEW_H = 125*7 = 875
// Scalo proporzionalmente: VIEW_W=660 -> VIEW_H = 660/3 * 7 = 1540 (celle quadrate)
// Ma questo mi fa un viewBox 660x1540, che in desktop (wrapper 660x660 con overflow) 
// non funziona. Serve un viewBox DIVERSO per desktop e mobile.
const isMobile = window.matchMedia("(max-width: 500px)").matches;
const VIEW_W = 660;
const VIEW_H = isMobile ? 1600 : 600;
const CELL_W = VIEW_W / COLS;
const CELL_H = VIEW_H / ROWS;

// Raggio massimo: il valore 100% riempie quasi tutta la cella
// Lascio spazio sotto per la label regione
const LABEL_SPACE = isMobile ? 22 : 16;
const SIDE_MARGIN = isMobile ? 4 : 6;
const R_MAX = Math.min(CELL_W / 2 - SIDE_MARGIN, (CELL_H - LABEL_SPACE) / 2 - 2);

// Scala raggio: proporzionale al valore (richiesta esplicita dell'utente)
// dominio 0-100 -> 0-R_MAX
const rScale = v => (v / 100) * R_MAX;

// Setup SVG
const chartDiv = document.getElementById("chart");
const tooltip = document.getElementById("tooltip");

const svg = d3.select("#chart").append("svg")
  .attr("viewBox", `0 0 ${VIEW_W} ${VIEW_H}`)
  .attr("preserveAspectRatio", "xMidYMid meet");

// Su mobile forzo l'SVG a larghezza 100% con altezza calcolata per preservare le proporzioni
// Così il grafico si estende in verticale e le rosette sono grandi
if (isMobile) {
  svg.style("width", "100%")
     .style("height", "auto");
}

// Arc generator: ogni settore copre 90° (π/2)
// Orientamento D3: 0 rad = nord, cresce in senso orario
// Settore 0: 0 -> π/2 (alto-dx)
// Settore 1: π/2 -> π (basso-dx)
// Settore 2: π -> 3π/2 (basso-sx)
// Settore 3: 3π/2 -> 2π (alto-sx)
const arc = d3.arc()
  .innerRadius(0)
  .startAngle(d => d.sectorIndex * Math.PI / 2)
  .endAngle(d => (d.sectorIndex + 1) * Math.PI / 2)
  .outerRadius(d => rScale(d.value));

// Disegno ogni regione (inverto X/Y: nel file X=1..7 diventa riga, Y=1..3 diventa colonna)
DATA.forEach(region => {
  const cx = (region.y - 0.5) * CELL_W;
  const cy = (region.x - 0.5) * CELL_H - LABEL_SPACE / 2;

  const g = svg.append("g")
    .attr("transform", `translate(${cx}, ${cy})`);

  // Cerchi guida (al 50% e al 100%)
  g.append("circle").attr("class", "guide-circle").attr("r", R_MAX);
  g.append("circle").attr("class", "guide-circle").attr("r", R_MAX * 0.5);

  // Settori: li disegno in ordine di valore decrescente così i piccoli stanno sopra
  // ma mantengo la posizione fissa per colore
  const sectors = SECTORS.map((s, i) => ({
    sectorIndex: i,
    key: s.key,
    label: s.label,
    color: s.color,
    value: region[s.key],
    region: region.name
  }));

  // Ordino per valore desc così i più grandi stanno dietro
  const sorted = sectors.slice().sort((a, b) => b.value - a.value);

  sorted.forEach(s => {
    if (s.value === 0 || s.value == null) {
      // Dato non disponibile: disegno il perimetro del settore a R_MAX tratteggiato
      const naArc = d3.arc()
        .innerRadius(0)
        .startAngle(s.sectorIndex * Math.PI / 2)
        .endAngle((s.sectorIndex + 1) * Math.PI / 2)
        .outerRadius(R_MAX);
      g.append("path")
        .attr("class", "sector na")
        .attr("d", naArc({}))
        .attr("data-region", s.region)
        .attr("data-key", s.key)
        .attr("data-label", s.label)
        .attr("data-value", "n.d.")
        .on("mousemove", showTooltip)
        .on("mouseleave", hideTooltip);
    } else {
      g.append("path")
        .attr("class", "sector")
        .attr("d", arc(s))
        .attr("fill", s.color)
        .attr("data-region", s.region)
        .attr("data-key", s.key)
        .attr("data-label", s.label)
        .attr("data-value", s.value)
        .on("mousemove", showTooltip)
        .on("mouseleave", hideTooltip);
    }
  });

  // Nome regione sotto la rosetta
  g.append("text")
    .attr("class", "region-label")
    .attr("y", R_MAX + (isMobile ? 16 : 11))
    .style("font-size", isMobile ? "16px" : "11px")
    .text(region.name);
});

function showTooltip(event) {
  const el = event.currentTarget;
  const region = el.getAttribute("data-region");
  const label = el.getAttribute("data-label");
  const value = el.getAttribute("data-value");
  const valStr = value === "n.d." ? "n.d." : parseFloat(value).toLocaleString("it-IT", {minimumFractionDigits: 1, maximumFractionDigits: 1}) + "%";
  tooltip.innerHTML = `<b>${region}</b><br>${label}<br>${valStr}`;

  const wrapperRect = document.getElementById("wrapper").getBoundingClientRect();
  const x = event.clientX - wrapperRect.left + 12;
  const y = event.clientY - wrapperRect.top + 12;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
  tooltip.style.opacity = 1;
}

function hideTooltip() {
  tooltip.style.opacity = 0;
}
</script>
</body>
</html>
